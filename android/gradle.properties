org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=1G -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true

# Corporate HTTP(S)_PROXY often breaks Flutter’s Gradle downloads from Google Cloud Storage
# (io.flutter:* on storage.googleapis.com) with 403. Send those hosts direct from Gradle’s JVM.
# If your network blocks direct Google access, you need IT to allowlist the proxy path instead.
systemProp.https.nonProxyHosts=localhost|127.0.0.1|*.google.com|*.googleapis.com|*.gstatic.com
systemProp.http.nonProxyHosts=localhost|127.0.0.1|*.google.com|*.googleapis.com|*.gstatic.com
